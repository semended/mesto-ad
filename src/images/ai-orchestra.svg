<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0d0d17"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#3a3a5c" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0d0d17" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6b3e1f"/>
      <stop offset="1" stop-color="#3a2110"/>
    </linearGradient>
  </defs>

  <rect width="960" height="560" fill="url(#stage)"/>
  <rect width="960" height="560" fill="url(#spot)"/>
  <rect y="440" width="960" height="120" fill="url(#floor)"/>

  <!-- Banner -->
  <rect x="230" y="28" width="500" height="56" rx="6" fill="#000" stroke="#ffce00" stroke-width="2"/>
  <text x="480" y="64" text-anchor="middle" fill="#fff" font-size="24" font-weight="900" letter-spacing="1">🎼  AI-ОРКЕСТР · «Место» · соч. 42</text>

  <!-- Floating notes -->
  <g fill="#ffce00" opacity="0.85" font-size="26">
    <text x="120" y="150">♪</text>
    <text x="820" y="130">♫</text>
    <text x="700" y="200">♩</text>
    <text x="250" y="210">♬</text>
    <text x="560" y="120">♪</text>
  </g>

  <!-- ===== STRINGS bot (violin) ===== -->
  <g transform="translate(150,300)">
    <rect x="-34" y="0" width="68" height="78" rx="14" fill="#a14b1f"/>
    <circle cx="0" cy="-26" r="24" fill="#c96a32"/>
    <circle cx="-8" cy="-28" r="5" fill="#fff"/><circle cx="9" cy="-28" r="5" fill="#fff"/>
    <line x1="0" y1="-50" x2="0" y2="-66" stroke="#c96a32" stroke-width="3"/><circle cx="0" cy="-70" r="4" fill="#ffce00"/>
    <ellipse cx="38" cy="20" rx="13" ry="22" fill="#e8c39e" transform="rotate(28 38 20)"/>
    <line x1="-30" y1="-2" x2="60" y2="36" stroke="#e8c39e" stroke-width="3"/>
    <text x="0" y="120" text-anchor="middle" fill="#e0a96d" font-size="15" font-weight="700">🎻 Струнные</text>
    <text x="0" y="140" text-anchor="middle" fill="#9c8" font-size="11">рендер карточек</text>
  </g>

  <!-- ===== BRASS bot (trumpet) ===== -->
  <g transform="translate(360,310)">
    <rect x="-32" y="0" width="64" height="74" rx="14" fill="#b9860b"/>
    <circle cx="0" cy="-24" r="23" fill="#d8a51c"/>
    <circle cx="-8" cy="-26" r="5" fill="#fff"/><circle cx="9" cy="-26" r="5" fill="#fff"/>
    <line x1="0" y1="-47" x2="0" y2="-63" stroke="#d8a51c" stroke-width="3"/><circle cx="0" cy="-67" r="4" fill="#ffce00"/>
    <rect x="20" y="6" width="46" height="9" rx="4" fill="#ffce00"/>
    <path d="M64 -3 L92 -14 L92 24 L64 18 Z" fill="#ffce00"/>
    <text x="0" y="116" text-anchor="middle" fill="#ffce00" font-size="15" font-weight="700">🎺 Духовые</text>
    <text x="0" y="136" text-anchor="middle" fill="#9c8" font-size="11">fetch к API</text>
  </g>

  <!-- ===== CONDUCTOR bot (podium, center, raised) ===== -->
  <g transform="translate(560,250)">
    <rect x="-26" y="150" width="52" height="20" fill="#2a2a44"/>
    <rect x="-40" y="170" width="80" height="14" fill="#1a1a2e"/>
    <rect x="-30" y="0" width="60" height="80" rx="14" fill="#3d3d6b"/>
    <circle cx="0" cy="-26" r="26" fill="#5151a3"/>
    <circle cx="-9" cy="-28" r="6" fill="#7df9ff"/><circle cx="10" cy="-28" r="6" fill="#7df9ff"/>
    <line x1="0" y1="-52" x2="0" y2="-70" stroke="#5151a3" stroke-width="4"/><circle cx="0" cy="-74" r="5" fill="#7df9ff"/>
    <line x1="22" y1="10" x2="70" y2="-34" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <line x1="-22" y1="14" x2="-58" y2="-10" stroke="#5151a3" stroke-width="9" stroke-linecap="round"/>
    <text x="0" y="116" text-anchor="middle" fill="#7df9ff" font-size="14" font-weight="800">Дирижёр</text>
    <text x="0" y="134" text-anchor="middle" fill="#bcd" font-size="11">Claude Opus 4.7</text>
  </g>

  <!-- ===== PERCUSSION bot (drum) ===== -->
  <g transform="translate(760,315)">
    <rect x="-32" y="0" width="64" height="72" rx="14" fill="#1f6f8b"/>
    <circle cx="0" cy="-24" r="23" fill="#2e8fab"/>
    <circle cx="-8" cy="-26" r="5" fill="#fff"/><circle cx="9" cy="-26" r="5" fill="#fff"/>
    <line x1="0" y1="-47" x2="0" y2="-63" stroke="#2e8fab" stroke-width="3"/><circle cx="0" cy="-67" r="4" fill="#7df9ff"/>
    <ellipse cx="0" cy="74" rx="46" ry="14" fill="#e0e0e0"/>
    <rect x="-46" y="60" width="92" height="22" fill="#cf3a3a"/>
    <ellipse cx="0" cy="60" rx="46" ry="14" fill="#f3f3f3" stroke="#bbb"/>
    <line x1="-26" y1="-4" x2="-12" y2="50" stroke="#e8c39e" stroke-width="4" stroke-linecap="round"/>
    <line x1="30" y1="0" x2="16" y2="50" stroke="#e8c39e" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="118" text-anchor="middle" fill="#7df9ff" font-size="15" font-weight="700">🥁 Ударные</text>
    <text x="0" y="138" text-anchor="middle" fill="#9c8" font-size="11">попапы по Esc</text>
  </g>

  <!-- ===== KEYS bot (piano) ===== -->
  <g transform="translate(560,400)">
    <rect x="-30" y="-46" width="60" height="50" rx="12" fill="#5b2a86"/>
    <circle cx="0" cy="-66" r="20" fill="#7a3fb0"/>
    <circle cx="-7" cy="-68" r="4.5" fill="#fff"/><circle cx="8" cy="-68" r="4.5" fill="#fff"/>
    <line x1="0" y1="-86" x2="0" y2="-100" stroke="#7a3fb0" stroke-width="3"/><circle cx="0" cy="-104" r="4" fill="#c79bff"/>
    <rect x="-70" y="6" width="140" height="22" rx="3" fill="#f3f3f3" stroke="#999"/>
    <g fill="#222">
      <rect x="-58" y="6" width="6" height="14"/><rect x="-40" y="6" width="6" height="14"/>
      <rect x="-14" y="6" width="6" height="14"/><rect x="4" y="6" width="6" height="14"/>
      <rect x="22" y="6" width="6" height="14"/><rect x="48" y="6" width="6" height="14"/>
    </g>
    <text x="0" y="56" text-anchor="middle" fill="#c79bff" font-size="15" font-weight="700">🎹 Клавишные</text>
    <text x="0" y="74" text-anchor="middle" fill="#9c8" font-size="11">валидация форм</text>
  </g>

  <text x="480" y="540" text-anchor="middle" fill="#777" font-size="13" font-style="italic">Партитуру свёл Claude Opus 4.7 · работоспособность «Места» не пострадала ни на одну ноту</text>
</svg>
