<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mesto — интерактивная страница, где пользователи делятся фотографиями памятных мест." />
    <meta name="author" content="Vladislav Golodnyuk" />
    <meta name="keywords" content="Mesto, фотографии, путешествия, Россия" />
    <link rel="icon" type="image/svg+xml" href="/src/images/logo.svg" />
    <title>Mesto</title>
    <script type="module" src="/src/scripts/index.js"></script>
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img src="./src/images/logo.svg" alt="Mesto Russia" class="header__logo" />
      </header>

      <main class="content">
        <section class="profile page__section" aria-label="Профиль">
          <div class="profile__image" role="button" tabindex="0" aria-label="Сменить аватар"></div>
          <div class="profile__info">
            <h1 class="profile__title"></h1>
            <button type="button" class="profile__edit-button" aria-label="Редактировать профиль"></button>
            <p class="profile__description"></p>
          </div>
          <button type="button" class="profile__add-button" aria-label="Добавить карточку"></button>
        </section>

        <section class="places page__section" aria-label="Карточки мест">
          <ul class="places__list"></ul>
        </section>
      </main>

      <footer class="footer page__section">
        <p class="footer__copyright">&copy; 2024 Mesto Russia</p>
      </footer>
    </div>

    <!-- Шаблон карточки -->
    <template id="card-template">
      <li class="card places__item">
        <img class="card__image" src="" alt="" />
        <button type="button" class="card__delete-button" aria-label="Удалить карточку"></button>
        <div class="card__description">
          <h2 class="card__title"></h2>
          <div class="card__like-group">
            <button type="button" class="card__like-button" aria-label="Поставить лайк"></button>
            <span class="card__like-count">0</span>
          </div>
        </div>
      </li>
    </template>

    <!-- Попап редактирования профиля -->
    <div class="popup popup_type_edit">
      <div class="popup__container">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <h3 class="popup__title">Редактировать профиль</h3>
        <form name="edit-profile" class="popup__form" novalidate>
          <label class="popup__label">
            <input type="text" name="name" class="popup__input popup__input_type_name"
              placeholder="Имя" required minlength="2" maxlength="40"
              pattern="^[A-Za-zА-Яа-яЁё\s\-]+$" />
            <span class="popup__error popup__error_visible" data-error-for="name"></span>
          </label>
          <label class="popup__label">
            <input type="text" name="description" class="popup__input popup__input_type_description"
              placeholder="О себе" required minlength="2" maxlength="200" />
            <span class="popup__error popup__error_visible" data-error-for="description"></span>
          </label>
          <button type="submit" class="popup__button">Сохранить</button>
        </form>
      </div>
    </div>

    <!-- Попап добавления карточки -->
    <div class="popup popup_type_new-card">
      <div class="popup__container">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <h3 class="popup__title">Новое место</h3>
        <form name="new-place" class="popup__form" novalidate>
          <label class="popup__label">
            <input type="text" name="place-name" class="popup__input popup__input_type_card-name"
              placeholder="Название" required minlength="2" maxlength="30"
              pattern="^[A-Za-zА-Яа-яЁё\s\-]+$" />
            <span class="popup__error popup__error_visible" data-error-for="place-name"></span>
          </label>
          <label class="popup__label">
            <input type="url" name="link" class="popup__input popup__input_type_url"
              placeholder="Ссылка на картинку" required />
            <span class="popup__error popup__error_visible" data-error-for="link"></span>
          </label>
          <button type="submit" class="popup__button">Создать</button>
        </form>
      </div>
    </div>

    <!-- Попап смены аватара -->
    <div class="popup popup_type_avatar">
      <div class="popup__container">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <h3 class="popup__title">Обновить аватар</h3>
        <form name="edit-avatar" class="popup__form" novalidate>
          <label class="popup__label">
            <input type="url" name="avatar" class="popup__input popup__input_type_avatar"
              placeholder="Ссылка на аватар" required />
            <span class="popup__error popup__error_visible" data-error-for="avatar"></span>
          </label>
          <button type="submit" class="popup__button">Сохранить</button>
        </form>
      </div>
    </div>

    <!-- Попап увеличенной картинки -->
    <div class="popup popup_type_image">
      <div class="popup__container popup__container_type_image">
        <button type="button" class="popup__close" aria-label="Закрыть"></button>
        <img src="" alt="" class="popup__image" />
        <p class="popup__caption"></p>
      </div>
    </div>

  </body>
</html>
